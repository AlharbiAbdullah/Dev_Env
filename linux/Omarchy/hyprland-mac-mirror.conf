# Hyprland bindings mirroring macOS Aerospace setup.
# Source this from ~/.config/hypr/hyprland.conf with:
#   source = ~/.config/hypr/hyprland-mac-mirror.conf
#
# This overrides Omarchy defaults so muscle memory from Mac carries over.
# Mod key is CTRL (matches Aerospace).

# ============================================================================
# GAPS + BORDERS (Gruvbox bright yellow, matches Aerospace/i3)
# ============================================================================
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 3
    col.active_border = rgba(d79921ff)
    col.inactive_border = rgba(282828ff)
    layout = dwindle
}

decoration {
    rounding = 0
}

# ============================================================================
# WORKSPACE SWITCHING (ctrl + number)
# ============================================================================
bind = CTRL, 1, workspace, 1
bind = CTRL, 2, workspace, 2
bind = CTRL, 3, workspace, 3
bind = CTRL, 4, workspace, 4
bind = CTRL, 5, workspace, 5
bind = CTRL, 6, workspace, 6
bind = CTRL, 7, workspace, 7
bind = CTRL, 8, workspace, 8
bind = CTRL, 9, workspace, 9
bind = CTRL, 0, workspace, 10

# ============================================================================
# MOVE WINDOW TO WORKSPACE (ctrl + shift + number)
# ============================================================================
bind = CTRL SHIFT, 1, movetoworkspace, 1
bind = CTRL SHIFT, 2, movetoworkspace, 2
bind = CTRL SHIFT, 3, movetoworkspace, 3
bind = CTRL SHIFT, 4, movetoworkspace, 4
bind = CTRL SHIFT, 5, movetoworkspace, 5
bind = CTRL SHIFT, 6, movetoworkspace, 6
bind = CTRL SHIFT, 7, movetoworkspace, 7
bind = CTRL SHIFT, 8, movetoworkspace, 8
bind = CTRL SHIFT, 9, movetoworkspace, 9
bind = CTRL SHIFT, 0, movetoworkspace, 10

# ============================================================================
# FOCUS NAVIGATION (ctrl + arrows)
# ============================================================================
bind = CTRL, left, movefocus, l
bind = CTRL, right, movefocus, r
bind = CTRL, up, movefocus, u
bind = CTRL, down, movefocus, d

# ============================================================================
# MOVE WINDOWS (alt + shift + arrows)
# ============================================================================
bind = ALT SHIFT, left, movewindow, l
bind = ALT SHIFT, right, movewindow, r
bind = ALT SHIFT, up, movewindow, u
bind = ALT SHIFT, down, movewindow, d

# ============================================================================
# APPS
# ============================================================================
bind = CTRL, T, exec, wezterm
bind = CTRL, Q, killactive
bind = CTRL, D, exec, walker

# ============================================================================
# LAYOUT
# ============================================================================
bind = CTRL, F, fullscreen
bind = ALT, slash, togglesplit
bind = CTRL SHIFT, space, togglefloating
bind = CTRL, space, cyclenext

# ============================================================================
# RESIZE (alt + minus/equal)
# ============================================================================
bind = ALT, minus, resizeactive, -50 0
bind = ALT, equal, resizeactive, 50 0
bind = ALT SHIFT, minus, resizeactive, 0 -50
bind = ALT SHIFT, equal, resizeactive, 0 50

# ============================================================================
# SCREENSHOT (matches Ubuntu i3 setup)
# Alt+S = copy full screen to clipboard via grim+wl-copy
# Print = save full screen to ~/Pictures/
# ============================================================================
bind = ALT, S, exec, grim - | wl-copy
bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
